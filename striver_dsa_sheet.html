<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Striver's DSA Sheet — A2Z Complete</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;
  --border:#2a2a40;--border2:#3a3a55;
  --text:#e8e8f0;--muted:#6a6a8a;
  --accent:#6c63ff;--accent2:#ff6584;
  --green:#00d4aa;--yellow:#ffd700;--orange:#ff8c42;--red:#ff4d6d;--blue:#4dabf7;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 1.5rem}
.hdr-in{max-width:1380px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px;gap:1rem}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-ic{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#fff}
.logo-tx{font-size:17px;font-weight:800;letter-spacing:-.5px}
.logo-tx span{color:var(--accent)}
.hdr-stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;white-space:nowrap}
.spill .n{font-weight:700;font-family:'JetBrains Mono',monospace}
.spill .ng{color:var(--green)}.spill .ny{color:var(--yellow)}.spill .nb{color:var(--blue)}.spill .nr{color:var(--red)}
.hdr-btns{display:flex;gap:8px;flex-shrink:0}
.btn{padding:7px 14px;border-radius:8px;border:none;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-g{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#7c74ff;transform:translateY(-1px)}

/* MAIN */
.main{max-width:1380px;margin:0 auto;padding:1.5rem}

/* HERO */
.hero{text-align:center;padding:2.5rem 1rem 1.5rem;margin-bottom:1.5rem;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(108,99,255,.14),transparent);border-radius:20px}
.hero h1{font-size:clamp(1.8rem,4.5vw,3rem);font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:.75rem}
.hero h1 .hl{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:14px;max-width:480px;margin:0 auto}

/* PROGRESS */
.prog-sec{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1.5rem}
.prog-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.prog-hd h3{font-size:14px;font-weight:600}
.prog-hd span{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}
.prog-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:1rem}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;transition:width .4s}
.cat-pills{display:flex;flex-wrap:wrap;gap:6px}
.cpill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .2s}
.cpill:hover,.cpill.active{border-color:var(--accent);color:var(--text);background:rgba(108,99,255,.1)}
.cpill .dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 13px}
.srch input{background:none;border:none;outline:none;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;width:100%}
.srch input::placeholder{color:var(--muted)}
.fsel{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:7px 13px;font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;outline:none}
.fsel:focus{border-color:var(--accent)}

/* TOPIC */
.tsec{margin-bottom:1.25rem}
.thdr{display:flex;align-items:center;gap:11px;padding:.9rem 1.2rem;background:var(--surface);border:1px solid var(--border);border-radius:12px 12px 0 0;cursor:pointer;user-select:none;transition:border-color .2s}
.thdr:hover{border-color:var(--border2)}
.thdr.open{border-color:var(--accent);border-bottom-color:var(--border)}
.tnum{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;background:var(--surface2);border:1px solid var(--border);flex-shrink:0}
.tinfo{flex:1}
.tinfo h2{font-size:14px;font-weight:700}
.tinfo p{font-size:11px;color:var(--muted);margin-top:1px}
.tmini{display:flex;align-items:center;gap:9px}
.mbar{width:72px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.mfill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.mcnt{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.chev{color:var(--muted);font-size:14px;transition:transform .3s;flex-shrink:0}
.open .chev{transform:rotate(180deg)}

/* TABLE */
.ptbl{border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;display:none}
.ptbl.vis{display:block}
.thead{display:grid;grid-template-columns:38px 1fr 78px 90px 90px 95px;padding:7px 1.2rem;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;gap:0}
.prow{display:grid;grid-template-columns:38px 1fr 78px 90px 90px 95px;padding:9px 1.2rem;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;gap:0}
.prow:last-child{border-bottom:none}
.prow:hover{background:rgba(255,255,255,.018)}
.prow.solved{background:rgba(0,212,170,.025)}

/* Checkbox */
.pchk{width:19px;height:19px;border-radius:5px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.pchk:hover{border-color:var(--green)}
.pchk.ck{background:var(--green);border-color:var(--green)}
.pchk.ck::after{content:'✓';color:#0a0a0f;font-size:11px;font-weight:800}

/* Name */
.pname{font-size:12.5px;font-weight:600;padding-right:10px;line-height:1.3}

/* Diff */
.diff{font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;display:inline-block}
.de{background:rgba(0,212,170,.1);color:var(--green)}
.dm{background:rgba(255,215,0,.1);color:var(--yellow)}
.dh{background:rgba(255,77,109,.1);color:var(--red)}

/* Links */
.plnks{display:flex;gap:5px;flex-wrap:wrap}
.lbtn{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-decoration:none;border:1px solid;transition:all .15s;display:inline-block;white-space:nowrap}
.llc{color:var(--orange);border-color:var(--orange)}
.llc:hover{background:rgba(255,140,66,.12)}
.lgfg{color:var(--green);border-color:var(--green)}
.lgfg:hover{background:rgba(0,212,170,.12)}
.lna{color:var(--muted);border-color:var(--border);font-size:9px;cursor:default}

/* Status */
.pst{font-size:11px;color:var(--muted);text-align:right}
.prow.solved .pst{color:var(--green);font-weight:600}

/* Done banner */
.done-banner{display:none;text-align:center;padding:11px;margin-bottom:1.5rem;background:rgba(0,212,170,.09);border:1px solid var(--green);border-radius:12px;color:var(--green);font-weight:600;font-size:14px}

@media(max-width:768px){
  .hdr-stats{display:none}
  .main{padding:1rem}
  .thead,.prow{grid-template-columns:34px 1fr 68px 80px}
  .thead .c-st,.prow .pst,.thead .c-lk2,.prow .plnks:last-child{display:none}
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-ic">A2Z</div>
      <div class="logo-tx">Striver's <span>DSA Sheet</span></div>
    </div>
    <div class="hdr-stats">
      <div class="spill">Solved <span class="n ng" id="ts">0</span></div>
      <div class="spill">Total <span class="n nb" id="tt">0</span></div>
      <div class="spill">Easy <span class="n ng" id="es">0</span>/<span class="n" id="et">0</span></div>
      <div class="spill">Med <span class="n ny" id="ms">0</span>/<span class="n" id="mt">0</span></div>
      <div class="spill">Hard <span class="n nr" id="hs">0</span>/<span class="n" id="ht">0</span></div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-g" onclick="resetAll()">Reset</button>
      <button class="btn btn-p" onclick="exportProg()">Export</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="hero">
    <h1>Striver's <span class="hl">DSA Sheet</span><br>A2Z Complete</h1>
    <p>450+ curated problems with direct LeetCode &amp; GFG links across 20 topics — crack any FAANG interview.</p>
  </div>

  <div class="done-banner" id="done-banner">🎉 Congratulations! All problems solved! You're FAANG-ready!</div>

  <div class="prog-sec">
    <div class="prog-hd"><h3>Overall Progress</h3><span id="prog-txt">0 / 0 solved</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="cat-pills" id="cat-pills"></div>
  </div>

  <div class="filters">
    <div class="srch">
      <span style="color:var(--muted);font-size:13px">🔍</span>
      <input type="text" id="srch-in" placeholder="Search problems..." oninput="filterProbs()">
    </div>
    <select class="fsel" id="diff-f" onchange="filterProbs()">
      <option value="">All Difficulties</option>
      <option>Easy</option><option>Medium</option><option>Hard</option>
    </select>
    <select class="fsel" id="stat-f" onchange="filterProbs()">
      <option value="">All Status</option>
      <option value="solved">Solved</option><option value="unsolved">Unsolved</option>
    </select>
    <button class="btn btn-g" onclick="expandAll()">Expand All</button>
    <button class="btn btn-g" onclick="collapseAll()">Collapse All</button>
  </div>

  <div id="tc"></div>
</div>

let solved = new Set(JSON.parse(localStorage.getItem('dsa2-solved')||'[]'));

function buildAll(){
  const container = document.getElementById('tc');
  container.innerHTML='';
  DATA.forEach(t=>container.appendChild(buildTopic(t)));
  buildPills();
  updateStats();
}

function buildTopic(t){
  const s=t.problems.filter(p=>solved.has(p.id)).length;
  const tot=t.problems.length;
  const pct=tot?Math.round(s/tot*100):0;
  const sec=document.createElement('div');
  sec.className=`tsec`;sec.id=`t${t.id}`;
  sec.innerHTML=`
<div class="thdr" id="th${t.id}" onclick="toggle(${t.id})">
  <div class="tnum" style="color:hsl(${t.id*19},70%,65%)">${String(t.id).padStart(2,'0')}</div>
  <div class="tinfo"><h2>${t.title}</h2><p>${t.desc}</p></div>
  <div class="tmini">
    <div class="mbar"><div class="mfill" id="mf${t.id}" style="width:${pct}%"></div></div>
    <span class="mcnt" id="mc${t.id}">${s}/${tot}</span>
  </div>
  <span class="chev">▼</span>
</div>
<div class="ptbl" id="pt${t.id}">
  <div class="thead"><span></span><span>Problem</span><span>Difficulty</span><span>LeetCode</span><span>GFG</span><span class="c-st" style="text-align:right">Status</span></div>
  ${t.problems.map(p=>row(p)).join('')}
</div>`;
  return sec;
}

function row(p){
  const ck=solved.has(p.id);
  const dc=p.diff==='Easy'?'de':p.diff==='Medium'?'dm':'dh';
  const lc=p.lc?`<a class="lbtn llc" href="${p.lc}" target="_blank" rel="noopener">LC ↗</a>`:`<span class="lbtn lna">N/A</span>`;
  const gfg=p.gfg?`<a class="lbtn lgfg" href="${p.gfg}" target="_blank" rel="noopener">GFG ↗</a>`:`<span class="lbtn lna">N/A</span>`;
  return `<div class="prow${ck?' solved':''}" id="r${p.id}" data-id="${p.id}" data-diff="${p.diff}">
<div class="pchk${ck?' ck':''}" onclick="tog('${p.id}')" title="Toggle solved"></div>
<div class="pname">${p.name}</div>
<div><span class="diff ${dc}">${p.diff}</span></div>
<div class="plnks">${lc}</div>
<div class="plnks">${gfg}</div>
<div class="pst c-st">${ck?'✓ Solved':'—'}</div>
</div>`;
}

function tog(id){
  solved.has(id)?solved.delete(id):solved.add(id);
  localStorage.setItem('dsa2-solved',JSON.stringify([...solved]));
  const row=document.getElementById(`r${id}`);
  const chk=row.querySelector('.pchk');
  const st=row.querySelector('.pst');
  if(solved.has(id)){row.classList.add('solved');chk.classList.add('ck');st.textContent='✓ Solved';}
  else{row.classList.remove('solved');chk.classList.remove('ck');st.textContent='—';}
  const sec=row.closest('.tsec');
  const tid=parseInt(sec.id.slice(1));
  updateTopicMini(tid);
  updateStats();
}

function updateTopicMini(tid){
  const t=DATA.find(x=>x.id===tid);if(!t)return;
  const s=t.problems.filter(p=>solved.has(p.id)).length;
  const tot=t.problems.length;
  const mf=document.getElementById(`mf${tid}`);
  const mc=document.getElementById(`mc${tid}`);
  if(mf)mf.style.width=(tot?Math.round(s/tot*100):0)+'%';
  if(mc)mc.textContent=`${s}/${tot}`;
}

function updateStats(){
  let ts=0,tt=0,es=0,et=0,ms=0,mt=0,hs=0,ht=0;
  DATA.forEach(t=>t.problems.forEach(p=>{
    tt++;if(solved.has(p.id))ts++;
    if(p.diff==='Easy'){et++;if(solved.has(p.id))es++;}
    else if(p.diff==='Medium'){mt++;if(solved.has(p.id))ms++;}
    else{ht++;if(solved.has(p.id))hs++;}
  }));
  document.getElementById('ts').textContent=ts;
  document.getElementById('tt').textContent=tt;
  document.getElementById('es').textContent=es;document.getElementById('et').textContent=et;
  document.getElementById('ms').textContent=ms;document.getElementById('mt').textContent=mt;
  document.getElementById('hs').textContent=hs;document.getElementById('ht').textContent=ht;
  const pct=tt?Math.round(ts/tt*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=`${ts} / ${tt} solved (${pct}%)`;
  document.getElementById('done-banner').style.display=(ts===tt&&tt>0)?'block':'none';
}

function buildPills(){
  const c=document.getElementById('cat-pills');
  c.innerHTML=`<div class="cpill active" onclick="scrollTop(this)"><span class="dot"></span>All</div>`+
    DATA.map(t=>`<div class="cpill" onclick="scrollTo(${t.id},this)"><span class="dot"></span>${t.title.split('—')[0].trim()}</div>`).join('');
}
function scrollTop(el){document.querySelectorAll('.cpill').forEach(p=>p.classList.remove('active'));el.classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function scrollTo(id,el){document.querySelectorAll('.cpill').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById(`t${id}`).scrollIntoView({behavior:'smooth',block:'start'});}

function toggle(id){
  document.getElementById(`th${id}`).classList.toggle('open');
  document.getElementById(`pt${id}`).classList.toggle('vis');
}
function expandAll(){DATA.forEach(t=>{document.getElementById(`th${t.id}`).classList.add('open');document.getElementById(`pt${t.id}`).classList.add('vis');});}
function collapseAll(){DATA.forEach(t=>{document.getElementById(`th${t.id}`).classList.remove('open');document.getElementById(`pt${t.id}`).classList.remove('vis');});}

function filterProbs(){
  const q=document.getElementById('srch-in').value.toLowerCase();
  const d=document.getElementById('diff-f').value;
  const s=document.getElementById('stat-f').value;
  document.querySelectorAll('.prow').forEach(r=>{
    const nm=r.querySelector('.pname').textContent.toLowerCase();
    const rd=r.getAttribute('data-diff');
    const rid=r.getAttribute('data-id');
    const isSolved=solved.has(rid);
    const ok=(!q||nm.includes(q))&&(!d||rd===d)&&(!s||(s==='solved'?isSolved:!isSolved));
    r.style.display=ok?'':'none';
  });
  if(q||d||s){
    DATA.forEach(t=>{
      const tbl=document.getElementById(`pt${t.id}`);
      const has=[...tbl.querySelectorAll('.prow')].some(r=>r.style.display!=='none');
      document.getElementById(`th${t.id}`).classList.toggle('open',has);
      tbl.classList.toggle('vis',has);
    });
  }
}

function resetAll(){
  if(!confirm('Reset all progress? This cannot be undone.'))return;
  solved.clear();localStorage.removeItem('dsa2-solved');buildAll();
}

function exportProg(){
  const tt=DATA.reduce((s,t)=>s+t.problems.length,0);
  const d={
    date:new Date().toISOString(),
    solved:solved.size,total:tt,
    percent:Math.round(solved.size/tt*100),
    topics:DATA.map(t=>({topic:t.title,solved:t.problems.filter(p=>solved.has(p.id)).length,total:t.problems.length}))
  };
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='dsa-striver-progress.json';a.click();URL.revokeObjectURL(u);
}

buildAll();
</script>
</body>
</html>
